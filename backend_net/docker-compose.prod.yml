version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: backend_net_prod_sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD:-CHANGE_THIS_IN_PRODUCTION}
      MSSQL_PID: "Express"
    volumes:
      - sqlserver_prod_data:/var/opt/mssql
    networks:
      - backend_prod_network
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P ${SA_PASSWORD} -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    # NO PORTS EXPOSED - Only accessible within Docker network
    # This ensures developers cannot access production database

  backend_api:
    build:
      context: ..
      dockerfile: backend_net/Dockerfile
    container_name: backend_net_api_prod
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=backend_net_db;User Id=sa;Password=${SA_PASSWORD:-CHANGE_THIS_IN_PRODUCTION};TrustServerCertificate=True;
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - backend_prod_network

volumes:
  sqlserver_prod_data:
    driver: local

networks:
  backend_prod_network:
    driver: bridge
    # Isolated network - no external access
