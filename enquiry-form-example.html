<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Enquiry Form</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.5rem; color: #333; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 500; margin-bottom: 6px; color: #444; }
    input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    input:focus, textarea:focus { outline: none; border-color: #0d6efd; }
    textarea { min-height: 80px; resize: vertical; }
    button { width: 100%; padding: 12px; background: #0d6efd; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 500; cursor: pointer; }
    button:hover { background: #0b5ed7; }
    button:disabled { background: #6c757d; cursor: not-allowed; }
    .message { padding: 12px; border-radius: 6px; margin-bottom: 16px; display: none; }
    .message.success { background: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
    .message.error { background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
    .config { background: #f8f9fa; padding: 16px; border-radius: 6px; margin-bottom: 24px; font-size: 13px; }
    .config label { font-size: 12px; }
    .config input { margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Contact Enquiry Form</h1>

  <div class="config">
    <p><strong>API Configuration</strong> – Set these before submitting:</p>
    <div class="form-group">
      <label>API Base URL (e.g. http://localhost:8080)</label>
      <input type="text" id="apiBaseUrl" value="http://localhost:8080" placeholder="http://localhost:8080">
    </div>
    <div class="form-group">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="Your API key">
    </div>
  </div>

  <div id="msgBox" class="message"></div>

  <form id="enquiryForm">
    <h3 style="font-size:1rem;margin-bottom:12px">Required fields</h3>
    <div class="form-group">
      <label for="fullName">Full Name *</label>
      <input type="text" id="fullName" name="fullName" required maxlength="200" placeholder="John Doe">
    </div>
    <div class="form-group">
      <label for="mobileNumber">Mobile Number *</label>
      <input type="tel" id="mobileNumber" name="mobileNumber" required maxlength="20" placeholder="+919876543210">
      <small style="color:#6c757d">Use E.164 format, e.g. +919876543210</small>
    </div>
    <div class="form-group">
      <label for="emailId">Email *</label>
      <input type="email" id="emailId" name="emailId" required maxlength="255" placeholder="john@example.com">
    </div>

    <h3 style="font-size:1rem;margin:20px 0 12px">Extra fields (stored in RawPayload)</h3>
    <p style="font-size:13px;color:#6c757d;margin-bottom:12px">Add any custom fields – they are saved as JSON and shown in Enquiry details.</p>
    <div class="form-group">
      <label for="enquiryMessage">Message</label>
      <textarea id="enquiryMessage" name="enquiryMessage" placeholder="Your message or query..."></textarea>
    </div>
    <div class="form-group">
      <label for="company">Company</label>
      <input type="text" id="company" name="company" placeholder="Acme Inc">
    </div>
    <div class="form-group">
      <label for="subject">Subject</label>
      <input type="text" id="subject" name="subject" placeholder="Product enquiry">
    </div>
    <div class="form-group">
      <label for="productInterest">Product / Service of Interest</label>
      <input type="text" id="productInterest" name="productInterest" placeholder="e.g. Website Design">
    </div>
    <div class="form-group">
      <label for="referrerUrl">Referrer URL (optional)</label>
      <input type="url" id="referrerUrl" name="referrerUrl" placeholder="https://your-website.com/contact">
    </div>
    <div class="form-group">
      <button type="submit" id="submitBtn">Submit Enquiry</button>
    </div>
  </form>

  <script>
    const form = document.getElementById('enquiryForm');
    const msgBox = document.getElementById('msgBox');
    const submitBtn = document.getElementById('submitBtn');

    function showMessage(text, isError = false) {
      msgBox.textContent = text;
      msgBox.className = 'message ' + (isError ? 'error' : 'success');
      msgBox.style.display = 'block';
    }

    function hideMessage() {
      msgBox.style.display = 'none';
    }

    // Extra field IDs - add any custom field id here to include in rawPayload
    const EXTRA_FIELD_IDS = ['enquiryMessage', 'company', 'subject', 'productInterest'];

    function buildPayload() {
      const extra = {};
      for (const id of EXTRA_FIELD_IDS) {
        const el = document.getElementById(id);
        if (el && el.value && el.value.trim()) {
          extra[el.name || id] = el.value.trim();
        }
      }

      const payload = {
        fullName: document.getElementById('fullName').value.trim(),
        mobileNumber: document.getElementById('mobileNumber').value.trim(),
        emailId: document.getElementById('emailId').value.trim(),
        source: 'api',
        referrerUrl: document.getElementById('referrerUrl').value.trim() || window.location.href
      };
      if (Object.keys(extra).length > 0) {
        payload.rawPayload = extra;
      }
      return payload;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage();

      const apiBaseUrl = document.getElementById('apiBaseUrl').value.trim();
      const apiKey = document.getElementById('apiKey').value.trim();

      if (!apiBaseUrl) {
        showMessage('Please set the API Base URL.', true);
        return;
      }
      if (!apiKey) {
        showMessage('Please set the API Key.', true);
        return;
      }

      const payload = buildPayload();

      submitBtn.disabled = true;

      try {
        const response = await fetch(apiBaseUrl.replace(/\/$/, '') + '/api/enquiries', {
          method: 'POST',
          headers: {
            'X-API-Key': apiKey,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('Enquiry submitted successfully! ID: ' + (data.data?.id || 'N/A'));
          form.reset();
        } else {
          showMessage(data.message || 'Failed to submit enquiry.', true);
        }
      } catch (err) {
        showMessage('Network error: ' + (err.message || 'Could not connect to API.'), true);
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
