server {
    listen 80;
    server_name ordbusinesshub.com www.ordbusinesshub.com;
    return 301 https://www.ordbusinesshub.com$request_uri;
}

server {
    listen 443 ssl; # managed by Certbot
    server_name ordbusinesshub.com;

    ssl_certificate /etc/letsencrypt/live/ordbusinesshub.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ordbusinesshub.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    return 301 https://www.ordbusinesshub.com$request_uri;
}

server {
    listen 443 ssl; # managed by Certbot
    server_name www.ordbusinesshub.com;

    # ordpanel homepage is large (inline CSS/JS). Disabling gzip here prevents
    # CPU-heavy compression delays that lead to 504 timeouts.
    gzip off;

    ssl_certificate /etc/letsencrypt/live/ordbusinesshub.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ordbusinesshub.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_connect_timeout 120s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
